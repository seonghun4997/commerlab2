<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>페이지를 찾을 수 없어요 — 커머랩</title>
<style>
:root{color-scheme:light only;
  --ink:#111318; --navy:#25315C; --body:#454C58; --gray:#8B95A1;
  --line:#EEF0F3; --blue:#2D62D9;
  --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Malgun Gothic',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#fff;height:100%}
body{font-family:var(--font);color:var(--ink);display:flex;align-items:center;justify-content:center;
  text-align:center;padding:24px;letter-spacing:-.02em}
.code{font-size:64px;font-weight:900;color:var(--navy);letter-spacing:-.03em}
h1{font-size:19px;font-weight:800;margin-top:10px}
p{font-size:14px;color:var(--gray);margin-top:8px;line-height:1.6}
.btn{display:inline-block;margin-top:22px;background:var(--navy);color:#fff;text-decoration:none;
  border-radius:13px;padding:14px 28px;font-size:14.5px;font-weight:800}
</style>
</head>
<body>
<div>
  <div class="code">404</div>
  <h1>페이지를 찾을 수 없어요</h1>
  <p>주소가 바뀌었거나 잘못 입력된 것 같아요.<br>홈에서 다시 찾아보세요.</p>
  <a class="btn" href="/">커머랩 홈으로</a>
</div>
</body>
</html>
