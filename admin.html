<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>커머랩 어드민</title>
<style>
:root{--ink:#111318;--navy:#25315C;--line:#EEF0F3;--blue:#2D62D9;--tile:#F4F5F7;
  --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:#EDEFF2;color:var(--ink);height:100vh;
  display:flex;flex-direction:column;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* 상단 툴바 */
.bar{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;
  gap:8px;padding:10px 14px;flex-wrap:wrap}
.bar .ttl{font-weight:900;font-size:15px;margin-right:6px}
.bar .ttl i{font-style:normal;color:var(--blue)}
.btn{border:1.5px solid #D7DCE3;border-radius:10px;padding:9px 13px;font-size:13px;
  font-weight:700;background:#fff;color:#454C58}
.btn.on{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.gh{background:#111318;border-color:#111318;color:#fff}
.hint{font-size:11.5px;color:#8B95A1;width:100%;padding-top:2px}

/* 본문: 미리보기 + 패널 */
.main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;justify-content:center;overflow:auto;padding:16px}
iframe{width:100%;max-width:560px;height:100%;min-height:600px;border:1px solid #D7DCE3;
  border-radius:14px;background:#fff;box-shadow:0 10px 30px rgba(17,19,24,.08)}
.panel{width:250px;background:#fff;border-left:1px solid var(--line);overflow:auto;
  display:none;flex-direction:column}
.panel.open{display:flex}
.panel h3{font-size:13px;font-weight:800;padding:14px 14px 8px;color:var(--navy)}
.sec{display:flex;align-items:center;gap:6px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12.5px}
.sec .nm{flex:1;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sec.hidden .nm{color:#B4BCC8;text-decoration:line-through}
.sec button{width:26px;height:26px;border:1px solid var(--line);border-radius:7px;
  font-size:12px;background:#fff}
.sec button:active{background:var(--tile)}
@media(max-width:760px){
  .main{flex-direction:column}
  .panel{width:100%;max-height:38vh;border-left:none;border-top:1px solid var(--line)}
}

/* 게이트 */
.gate{position:fixed;inset:0;background:#fff;z-index:99;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px}
.gate b{font-size:19px;font-weight:900}
.gate input{border:1.5px solid #D7DCE3;border-radius:11px;padding:13px 16px;font-size:15px;
  width:220px;text-align:center;font-family:inherit}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:rgba(17,19,24,.92);
  color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:99px;opacity:0;
  pointer-events:none;transition:.25s;z-index:100}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 비밀번호 게이트 (코드의 PASS 값 바꿔서 사용) -->
<div class="gate" id="gate">
  <b>커머랩<span style="color:var(--blue)">.</span> 어드민</b>
  <input id="pw" type="password" placeholder="비밀번호" inputmode="numeric">
  <button class="btn primary" onclick="unlock()">입장</button>
</div>

<div class="bar">
  <span class="ttl">커머랩<i>.</i> 어드민</span>
  <button class="btn on" id="mText" onclick="setMode('text')">✏️ 텍스트 수정</button>
  <button class="btn" id="mImg" onclick="setMode('img')">🖼 이미지 교체</button>
  <button class="btn" id="mSec" onclick="togglePanel()">↕ 섹션 순서</button>
  <button class="btn primary" onclick="download()">⬇ index.html 다운로드</button>
  <a class="btn gh" href="https://github.com/seonghun4997/commerlab2/upload/main" target="_blank">📤 GitHub 업로드</a>
  <span class="hint" id="hint">화면 속 글자를 클릭하면 바로 수정됩니다. 수정 후 [다운로드] → [GitHub 업로드]에 드래그하면 실사이트에 반영돼요.</span>
</div>

<div class="main">
  <div class="stage"><iframe id="frame" title="홈 미리보기"></iframe></div>
  <div class="panel" id="panel">
    <h3>섹션 순서 · 숨김</h3>
    <div id="secList"></div>
  </div>
</div>

<input type="file" id="file" accept="image/*" hidden>
<div class="toast" id="toast"></div>

<script>
const PASS='2026'; // ← 비밀번호 여기서 변경
let mode='text', doc=null;

function unlock(){
  if(document.getElementById('pw').value===PASS){
    document.getElementById('gate').style.display='none'; init();
  }else toast('비밀번호가 달라요');
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});

let tT;function toast(m){const t=document.getElementById('toast');t.textContent=m;
  t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2200);}

async function init(){
  let html;
  try{ html=await (await fetch('index.html',{cache:'no-store'})).text(); }
  catch(e){ toast('index.html을 못 불러왔어요 — 배포된 주소(…/admin.html)에서 열어주세요'); return; }
  const f=document.getElementById('frame');
  f.srcdoc=html;
  f.onload=()=>{
    doc=f.contentDocument;
    doc.designMode='on';                    // 글자 클릭 → 바로 수정
    // 링크 이동/새로고침 방지
    doc.addEventListener('click',e=>{
      const a=e.target.closest && e.target.closest('a');
      if(a) e.preventDefault();
      if(mode==='img') pickImage(e);
    },true);
    // 배너 자동 슬라이드 정지(편집 방해 방지)
    try{ for(let i=1;i<9999;i++) f.contentWindow.clearInterval(i);}catch(_){}
    buildSecList();
    toast('불러오기 완료 — 글자를 클릭해 수정해보세요');
  };
}

function setMode(m){
  mode=m;
  document.getElementById('mText').classList.toggle('on',m==='text');
  document.getElementById('mImg').classList.toggle('on',m==='img');
  if(doc) doc.designMode = (m==='text') ? 'on' : 'off';
  document.getElementById('hint').textContent =
    m==='text' ? '화면 속 글자를 클릭하면 바로 수정됩니다.'
               : '먼저 이미지 파일을 고른 뒤, 넣고 싶은 자리를 클릭하세요. (책 표지를 클릭하면 표지가 통째로 교체됩니다)';
  if(m==='img') document.getElementById('file').click();
}

let pendingImg=null;
document.getElementById('file').addEventListener('change',e=>{
  const fl=e.target.files[0]; if(!fl) return;
  const r=new FileReader();
  r.onload=()=>{ pendingImg=r.result; toast('이미지 준비됨 — 미리보기에서 넣을 자리를 클릭'); };
  r.readAsDataURL(fl); e.target.value='';
});
function pickImage(e){
  if(!pendingImg){ document.getElementById('file').click(); return; }
  e.preventDefault(); e.stopPropagation();
  const t=e.target;
  const book=t.closest && (t.closest('.fb-book')||t.closest('.bn-book'));
  if(book){ // 책 표지 통째 교체
    book.style.padding='0'; book.style.border='none';
    book.innerHTML='<img src="'+pendingImg+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block">';
  }else{
    const box=t.closest('div,section,header,a,span')||t;
    box.style.backgroundImage='url('+pendingImg+')';
    box.style.backgroundSize='cover'; box.style.backgroundPosition='center';
  }
  toast('이미지 적용됨'); pendingImg=null; setMode('text');
}

function togglePanel(){
  const p=document.getElementById('panel');
  p.classList.toggle('open');
  document.getElementById('mSec').classList.toggle('on',p.classList.contains('open'));
  if(p.classList.contains('open')) buildSecList();
}
function secLabel(el){
  const h=el.querySelector && el.querySelector('h1,h2,h3');
  if(el.tagName==='HEADER')return '상단 헤더';
  if(el.classList.contains('banners'))return '배너 슬라이드';
  if(el.classList.contains('dots'))return '배너 도트';
  if(el.tagName==='FOOTER')return '푸터';
  if(el.tagName==='NAV')return '하단 탭바';
  return h? h.textContent.trim().slice(0,14) : el.tagName.toLowerCase();
}
function movable(){
  return [...doc.body.children].filter(el=>
    !['SCRIPT','STYLE'].includes(el.tagName) && !el.classList.contains('toast'));
}
function buildSecList(){
  if(!doc) return;
  const list=document.getElementById('secList'); list.innerHTML='';
  movable().forEach(el=>{
    const row=document.createElement('div'); row.className='sec'+(el.style.display==='none'?' hidden':'');
    row.innerHTML='<span class="nm">'+secLabel(el)+'</span>';
    const up=document.createElement('button'); up.textContent='↑';
    up.onclick=()=>{const p=el.previousElementSibling;
      if(p&&!['SCRIPT','STYLE'].includes(p.tagName)){el.parentNode.insertBefore(el,p);buildSecList();}};
    const dn=document.createElement('button'); dn.textContent='↓';
    dn.onclick=()=>{const n=el.nextElementSibling;
      if(n&&!['SCRIPT','STYLE'].includes(n.tagName)){el.parentNode.insertBefore(n,el);buildSecList();}};
    const hd=document.createElement('button'); hd.textContent=el.style.display==='none'?'👁':'－';
    hd.title='숨김/표시';
    hd.onclick=()=>{el.style.display = el.style.display==='none' ? '' : 'none'; buildSecList();};
    row.append(up,dn,hd); list.append(row);
  });
}

function download(){
  if(!doc){toast('아직 불러오는 중이에요');return;}
  doc.designMode='off';
  const html='<!DOCTYPE html>\n'+doc.documentElement.outerHTML;
  doc.designMode = mode==='text' ? 'on' : 'off';
  const b=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download='index.html'; a.click();
  URL.revokeObjectURL(a.href);
  toast('index.html 저장됨 — GitHub 업로드 버튼으로 올리면 반영!');
}
</script>
</body>
</html>
